<div class="wel">
    <!-- Header superiore con logo foglie -->
    <header class="wel__header">
        <div class="wel__brand-logo">
            <svg class="wel__logo-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 21V11M12 11C12 11 9 7 5 7C5 7 5 11 9 13C10.5 13.75 12 11 12 11ZM12 11C12 11 15 5 19 5C19 5 20 10 16 12C14.5 12.75 12 11 12 11Z" stroke="#8DA67D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
    </header>

    <!-- Sezione Branding -->
    <div class="wel__content">
        <h1 class="wel__title">ARMONIA</h1>
        <p class="wel__subtitle">Il tuo equilibrio inizia oggi</p>
    </div>

    <!-- Sezione Input e Azioni -->
    <div class="wel__actions">
        <!-- Input Nome con icona -->
        <div class="wel__field">
            <span class="wel__icon wel__icon--user"></span>
            <input type="text" id="user-name" class="wel__input" placeholder="Nome">
        </div>
        <!-- Pulsante Importa PDF con icona -->
        <button id="btn-import" class="wel__btn-secondary">
            <span class="wel__icon wel__icon--pdf"></span>
            Importa PDF
        </button>

        <!-- Pulsante Inizia con freccia -->
        <button id="btn-start" class="wel__btn-primary">
            Inizia
            <span class="wel__icon wel__icon--arrow"></span>
        </button>
        </div>

        <!-- Background Decoration -->
        <div class="wel__decoration"></div>

        <!-- Modal Importazione -->
        <div id="modal-import" class="wel-modal">
        <div class="wel-modal__overlay"></div>
        <div class="wel-modal__content">
            <div class="wel-modal__header">
                <h2 class="wel-modal__title">Importa Piano</h2>
                <button id="modal-close" class="wel-modal__close-btn">&times;</button>
            </div>
            <div class="wel-modal__body">
                <div class="wel-modal__actions">
                    <input type="file" id="file-input" accept=".pdf" style="display: none;">
                    <button id="btn-browse" class="wel__btn-secondary" style="height: 60px; margin-bottom: 24px;">Sfoglia File</button>
                    
                    <div class="wel-modal__field">
                        <label class="wel-modal__label">Durata piano</label>
                        <div class="wel-modal__counter">
                            <button type="button" id="weeks-minus" class="wel-modal__counter-btn">−</button>
                            <div class="wel-modal__counter-value">
                                <span id="weeks-display">1</span>
                                <span class="wel-modal__counter-unit">settimana</span>
                            </div>
                            <button type="button" id="weeks-plus" class="wel-modal__counter-btn">+</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </div>
        </div>
