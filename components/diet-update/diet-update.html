<div class="diu-container">
    <!-- Header Integrato via JS -->
    <div id="diu-header-root" style="width: 100%;"></div>

    <div class="diu-content">
        <!-- Sezione Azioni -->
        <div class="wel__actions">
            <!-- Info Stato Corrente -->
            <div id="diu-status" class="diu-status-card">
                <span class="diu-status-label">Stato attuale</span>
                <div id="diu-status-text" class="diu-status-value">Caricamento...</div>
            </div>

            <!-- Sfoglia File -->
            <button id="diu-btn-browse" class="wel__btn-secondary">
                <span class="wel__icon wel__icon--pdf"></span>
                Sfoglia Piano (JSON)
            </button>
            <input type="file" id="diu-file-input" accept=".json" style="display: none;">

            <!-- Selettore Settimane (Stile Welcome Modal) -->
            <div class="diu-counter-container">
                <label class="diu-label">Durata del piano</label>
                <div class="wel-modal__counter" style="max-width: 100%; margin-top: 8px;">
                    <button type="button" id="diu-weeks-minus" class="wel-modal__counter-btn">−</button>
                    <div class="wel-modal__counter-value">
                        <span id="diu-weeks-display">1</span>
                        <span class="wel-modal__counter-unit">settimana</span>
                    </div>
                    <button type="button" id="diu-weeks-plus" class="wel-modal__counter-btn">+</button>
                </div>
            </div>

            <!-- Pulsante Salva -->
            <button id="diu-btn-save" class="wel__btn-primary" style="margin-top: 20px; opacity: 0.5; pointer-events: none;">
                Aggiorna Piano
                <span class="wel__icon wel__icon--arrow"></span>
            </button>
        </div>
    </div>

    <!-- Modal Conflitto (Overlay) -->
    <div id="diu-modal-conflict" class="wel-modal">
        <div class="wel-modal__overlay"></div>
        <div class="wel-modal__content">
            <div class="wel-modal__header">
                <h2 class="wel-modal__title">Conflitto Date</h2>
                <button id="diu-modal-close" class="wel-modal__close-btn">&times;</button>
            </div>
            <div class="wel-modal__body" style="text-align: center;">
                <p id="diu-conflict-msg" style="color: #4A4A4A; margin-bottom: 24px; line-height: 1.5;">
                    Alcune date del nuovo piano sono già presenti. Vuoi sovrascriverle?
                </p>
                <div style="display: flex; gap: 12px;">
                    <button id="diu-btn-confirm-overwrite" class="wel__btn-primary" style="background-color: #d9534f; height: 50px;">Sovrascrivi</button>
                    <button id="diu-btn-cancel" class="wel__btn-secondary" style="height: 50px; border: 1px solid #ccc;">Annulla</button>
                </div>
            </div>
        </div>
    </div>
</div>
